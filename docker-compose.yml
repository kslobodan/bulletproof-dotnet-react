services:
  postgres:
    image: postgres:16-alpine
    container_name: bookingsystem-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: BookingSystemDB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bookingsystem-network

volumes:
  postgres-data:

networks:
  bookingsystem-network:
    driver: bridge
